server:
  port: ${PORT:8081}

spring:
  application:
    name: smartcare-service

  # Database — uses PostgreSQL on Render (DATABASE_URL), falls back to H2 locally
  datasource:
    url: ${DATABASE_URL:jdbc:h2:file:./data/smartcare_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE}
    driverClassName: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:password}

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    database-platform: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:admin@smartcare.com}
    password: ${MAIL_PASSWORD:YOUR_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Logging Configurations
logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO
    com.smartcare: DEBUG
