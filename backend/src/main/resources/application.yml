server:
  port: 8081

spring:
  application:
    name: smartcare-service

  # Database Engine Selection
  datasource:
    # Development Database Configuration (H2)
    url: jdbc:h2:file:./data/smartcare_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;AUTO_RECONNECT=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password: password
    
    # Production Database Configuration (Uncomment & Configure)
    # url: jdbc:mysql://localhost:3306/smartcare_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    # username: admin
    # password: secretpassword

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: admin@smartcare.com # Placeholder
    password: YOUR_APP_PASSWORD # Placeholder
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Logging Configurations
logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO
    com.smartcare: DEBUG
